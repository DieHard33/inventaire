<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inventaire Mobilier</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #F5F2EE;
    --surface: #FFFFFF;
    --surface2: #EDEAE5;
    --text: #1A1714;
    --text-muted: #8A8480;
    --accent: #C4633A;
    --accent-light: #F5E6DC;
    --garde: #3A7D5B;
    --garde-bg: #DFF0E8;
    --vendre: #C4633A;
    --vendre-bg: #F5E6DC;
    --jeter: #8A8480;
    --jeter-bg: #EDEAE5;
    --radius: 16px;
    --shadow: 0 2px 20px rgba(26,23,20,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--text);
    color: #F5F2EE;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: -0.3px;
  }
  header .subtitle {
    font-size: 12px;
    color: #8A8480;
    margin-top: 2px;
  }
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .stats-chips {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.2px;
  }
  .chip.total { background: #2E2B28; color: #F5F2EE; }
  .chip.garde { background: var(--garde); color: white; }
  .chip.vendre { background: var(--vendre); color: white; }
  .chip.jeter { background: #555; color: white; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    background: var(--surface2);
    margin: 12px 16px;
    border-radius: 12px;
    padding: 3px;
  }
  .tab {
    flex: 1;
    padding: 8px 4px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 9px;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 6px rgba(0,0,0,0.1);
  }

  /* FILTER BAR */
  .filter-bar {
    padding: 0 16px 12px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--surface2);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--text);
    border-color: var(--text);
    color: white;
  }

  /* VIEWS */
  #view-list, #view-add, #view-detail { display: none; }
  #view-list.active, #view-add.active, #view-detail.active { display: block; }

  /* ITEMS LIST */
  .items-container { padding: 0 16px 100px; }
  .room-group { margin-bottom: 20px; }
  .room-title {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-style: italic;
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .item-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    display: flex;
    gap: 12px;
    align-items: flex-start;
    cursor: pointer;
    transition: transform 0.1s;
    active: none;
  }
  .item-card:active { transform: scale(0.98); }
  .item-photo {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    overflow: hidden;
  }
  .item-photo img { width: 100%; height: 100%; object-fit: cover; }
  .item-info { flex: 1; min-width: 0; }
  .item-desc {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .item-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }
  .dest-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.2px;
  }
  .dest-badge.garde { background: var(--garde-bg); color: var(--garde); }
  .dest-badge.vendre { background: var(--vendre-bg); color: var(--vendre); }
  .dest-badge.jeter { background: var(--jeter-bg); color: var(--jeter); }
  .dest-badge.autre { background: #EEE5F8; color: #6B3FA0; }
  .item-qty {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 30px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text);
    margin-bottom: 8px;
  }
  .empty-state p { font-size: 14px; line-height: 1.5; }

  /* ADD FORM */
  #view-add {
    padding: 16px 16px 100px;
  }
  .form-title {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    margin-bottom: 20px;
  }
  .form-group { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  input[type="text"], input[type="number"], select, textarea {
    width: 100%;
    padding: 13px 14px;
    border: 1.5px solid var(--surface2);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }
  textarea { resize: none; min-height: 80px; }

  /* DEST SELECTOR */
  .dest-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .dest-option {
    padding: 12px;
    border-radius: 12px;
    border: 2px solid var(--surface2);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-size: 13px;
    font-weight: 600;
    background: var(--surface);
  }
  .dest-option.selected.garde { border-color: var(--garde); background: var(--garde-bg); color: var(--garde); }
  .dest-option.selected.vendre { border-color: var(--vendre); background: var(--vendre-bg); color: var(--vendre); }
  .dest-option.selected.jeter { border-color: var(--jeter); background: var(--jeter-bg); color: var(--jeter); }
  .dest-option.selected.autre { border-color: #6B3FA0; background: #EEE5F8; color: #6B3FA0; }

  /* CUSTOM DEST */
  .custom-dest-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .custom-dest-row input { flex: 1; }
  .btn-add-dest {
    padding: 13px 16px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  /* PHOTO UPLOAD */
  .photo-upload {
    border: 2px dashed var(--surface2);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    background: var(--surface);
  }
  .photo-upload .icon { font-size: 28px; margin-bottom: 8px; }
  .photo-upload p { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
  .btn-photo {
    padding: 11px 22px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .photo-previews {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .photo-preview-wrap {
    position: relative;
    width: 70px;
    height: 70px;
  }
  .photo-preview-wrap img {
    width: 70px;
    height: 70px;
    border-radius: 10px;
    object-fit: cover;
  }
  .photo-preview-wrap .del-photo {
    position: absolute;
    top: -5px;
    right: -5px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--text);
    color: white;
    border: none;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  /* BUTTONS */
  .btn-primary {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: var(--text);
    color: #F5F2EE;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .btn-primary:active { opacity: 0.85; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    border: none;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(196,99,58,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
    z-index: 200;
  }
  .fab:active { transform: scale(0.92); }

  /* DETAIL VIEW */
  #view-detail {
    padding: 16px 16px 100px;
  }
  .detail-back {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 20px;
    background: none;
    border: none;
  }
  .detail-photos {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin-bottom: 20px;
    scrollbar-width: none;
  }
  .detail-photos::-webkit-scrollbar { display: none; }
  .detail-photos img {
    width: 200px;
    height: 160px;
    border-radius: 14px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .no-photo-placeholder {
    width: 100%;
    height: 140px;
    border-radius: 14px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    margin-bottom: 20px;
  }
  .detail-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    margin-bottom: 6px;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--surface2);
  }
  .detail-row:last-of-type { border-bottom: none; }
  .detail-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
  .detail-value { font-size: 14px; font-weight: 500; text-align: right; max-width: 60%; }
  .btn-delete {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 2px solid #FFCDD2;
    background: #FFF5F5;
    color: #C62828;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
  }
  .btn-edit {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 2px solid var(--surface2);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }

  /* EXPORT */
  .export-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 10px;
    border: 1.5px solid #333;
    background: transparent;
    color: #F5F2EE;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>🏠 Mon Inventaire</h1>
      <div class="subtitle" id="subtitle-count">0 article</div>
    </div>
    <button class="export-btn" onclick="exportCSV()">📊 Export</button>
  </div>
  <div class="stats-chips" id="stats-chips"></div>
</header>

<!-- LIST VIEW -->
<div id="view-list" class="active">
  <div class="tabs">
    <button class="tab active" onclick="setTab('tous')">Tous</button>
    <button class="tab" onclick="setTab('garde')">✅ Je garde</button>
    <button class="tab" onclick="setTab('vendre')">💰 À vendre</button>
    <button class="tab" onclick="setTab('jeter')">🗑 À jeter</button>
  </div>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="items-container" id="items-container"></div>
</div>

<!-- ADD VIEW -->
<div id="view-add">
  <div class="form-title" id="form-title">Nouvel article</div>

  <div class="form-group">
    <label>Pièce</label>
    <select id="f-room">
      <option value="">Choisir une pièce…</option>
      <option>Salon</option>
      <option>Chambre principale</option>
      <option>Chambre 2</option>
      <option>Chambre 3</option>
      <option>Cuisine</option>
      <option>Salle de bain</option>
      <option>Entrée</option>
      <option>Bureau</option>
      <option>Garage</option>
      <option>Cave</option>
      <option>Autre</option>
    </select>
  </div>

  <div class="form-group">
    <label>Description</label>
    <input type="text" id="f-desc" placeholder="Ex: Canapé 3 places en lin beige…">
  </div>

  <div class="form-group">
    <label>Quantité</label>
    <input type="number" id="f-qty" value="1" min="1" style="width:100px;">
  </div>

  <div class="form-group">
    <label>Destination</label>
    <div class="dest-selector" id="dest-selector"></div>
    <div class="custom-dest-row">
      <input type="text" id="new-dest-input" placeholder="Autre destination…">
      <button class="btn-add-dest" onclick="addCustomDest()">+ Ajouter</button>
    </div>
  </div>

  <div class="form-group">
    <label>Notes</label>
    <textarea id="f-notes" placeholder="État, prix souhaité, remarques…"></textarea>
  </div>

  <div class="form-group">
    <label>Photos</label>
    <div class="photo-upload">
      <div class="icon">📷</div>
      <p>Galerie ou appareil photo</p>
      <button class="btn-photo" onclick="document.getElementById('f-photos').click()">+ Ajouter une photo</button>
      <input type="file" id="f-photos" accept="image/*" multiple onchange="handlePhotos(event)" style="display:none">
    </div>
    <div class="photo-previews" id="photo-previews"></div>
  </div>

  <button class="btn-primary" onclick="saveItem()">Enregistrer l'article</button>
  <button class="btn-edit" style="margin-top:8px;border-color:transparent;background:transparent;color:var(--text-muted);" onclick="showList()">Annuler</button>
</div>

<!-- DETAIL VIEW -->
<div id="view-detail">
  <button class="detail-back" onclick="showList()">← Retour</button>
  <div id="detail-content"></div>
</div>

<button class="fab" id="fab-btn" onclick="showAdd()">+</button>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────────
let items = JSON.parse(localStorage.getItem('inventory_items') || '[]');
let destinations = JSON.parse(localStorage.getItem('inventory_dests') || '["Je garde","À jeter","À vendre"]');
let currentTab = 'tous';
let currentRoomFilter = 'all';
let editingId = null;
let currentPhotos = []; // base64 strings

function save() {
  localStorage.setItem('inventory_items', JSON.stringify(items));
  localStorage.setItem('inventory_dests', JSON.stringify(destinations));
}

// ── DEST HELPERS ───────────────────────────────────────────────────────────────
function destClass(d) {
  if (!d) return '';
  const l = d.toLowerCase();
  if (l.includes('garde')) return 'garde';
  if (l.includes('vendre')) return 'vendre';
  if (l.includes('jeter')) return 'jeter';
  return 'autre';
}

// ── VIEWS ──────────────────────────────────────────────────────────────────────
function show(v) {
  document.getElementById('view-list').classList.remove('active');
  document.getElementById('view-add').classList.remove('active');
  document.getElementById('view-detail').classList.remove('active');
  document.getElementById(v).classList.add('active');
  document.getElementById('fab-btn').style.display = v === 'view-list' ? 'flex' : 'none';
  document.querySelector('.tabs') && (document.querySelector('.tabs').style.display = v === 'view-list' ? 'flex' : 'none');
  document.getElementById('filter-bar').style.display = v === 'view-list' ? 'flex' : 'none';
}

function showList() { show('view-list'); renderList(); }
function showAdd(id = null) {
  editingId = id;
  currentPhotos = [];
  document.getElementById('form-title').textContent = id ? 'Modifier l\'article' : 'Nouvel article';
  document.getElementById('f-room').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-qty').value = 1;
  document.getElementById('f-notes').value = '';
  document.getElementById('photo-previews').innerHTML = '';
  document.getElementById('new-dest-input').value = '';

  if (id) {
    const item = items.find(i => i.id === id);
    if (item) {
      document.getElementById('f-room').value = item.room || '';
      document.getElementById('f-desc').value = item.desc || '';
      document.getElementById('f-qty').value = item.qty || 1;
      document.getElementById('f-notes').value = item.notes || '';
      currentPhotos = item.photos ? [...item.photos] : [];
      renderPhotoPreviews();
    }
  }

  renderDestSelector(id ? items.find(i=>i.id===id)?.dest : null);
  show('view-add');
}

// ── RENDER LIST ────────────────────────────────────────────────────────────────
function renderList() {
  updateStats();
  renderFilterBar();

  let filtered = items.filter(item => {
    if (currentTab === 'garde' && destClass(item.dest) !== 'garde') return false;
    if (currentTab === 'vendre' && destClass(item.dest) !== 'vendre') return false;
    if (currentTab === 'jeter' && destClass(item.dest) !== 'jeter') return false;
    if (currentRoomFilter !== 'all' && item.room !== currentRoomFilter) return false;
    return true;
  });

  const container = document.getElementById('items-container');

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🛋️</div><h3>Aucun article</h3><p>Appuyez sur <strong>+</strong> pour ajouter votre premier meuble.</p></div>`;
    return;
  }

  // Group by room
  const groups = {};
  filtered.forEach(item => {
    const r = item.room || 'Sans pièce';
    if (!groups[r]) groups[r] = [];
    groups[r].push(item);
  });

  container.innerHTML = Object.entries(groups).map(([room, roomItems]) => `
    <div class="room-group">
      <div class="room-title">${room}</div>
      ${roomItems.map(renderCard).join('')}
    </div>
  `).join('');
}

function renderCard(item) {
  const dc = destClass(item.dest);
  const photoHTML = item.photos && item.photos.length > 0
    ? `<div class="item-photo"><img src="${item.photos[0]}" alt=""></div>`
    : `<div class="item-photo" style="font-size:24px;">${roomEmoji(item.room)}</div>`;

  return `
    <div class="item-card" onclick="showDetail('${item.id}')">
      ${photoHTML}
      <div class="item-info">
        <div class="item-desc">${item.desc || 'Sans description'}</div>
        <div class="item-meta">${item.room || ''}</div>
        <div class="item-footer">
          <span class="dest-badge ${dc}">${item.dest || '—'}</span>
          <span class="item-qty">× ${item.qty || 1}</span>
        </div>
      </div>
    </div>`;
}

function roomEmoji(room) {
  if (!room) return '📦';
  const r = room.toLowerCase();
  if (r.includes('salon')) return '🛋️';
  if (r.includes('chambre')) return '🛏️';
  if (r.includes('cuisine')) return '🍳';
  if (r.includes('bain')) return '🛁';
  if (r.includes('bureau')) return '💼';
  if (r.includes('entrée')) return '🚪';
  if (r.includes('garage')) return '🚗';
  if (r.includes('cave')) return '🍷';
  return '📦';
}

// ── TABS & FILTERS ─────────────────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  currentRoomFilter = 'all';
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['tous','garde','vendre','jeter'][i] === tab);
  });
  renderList();
}

function renderFilterBar() {
  const rooms = [...new Set(items.map(i => i.room).filter(Boolean))];
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = ['Toutes les pièces', ...rooms].map((r, idx) => {
    const isAll = idx === 0;
    const active = isAll ? currentRoomFilter === 'all' : currentRoomFilter === r;
    return `<button class="filter-btn ${active ? 'active' : ''}" onclick="setRoomFilter('${isAll ? 'all' : r}')">${r === 'all' ? 'Toutes les pièces' : r}</button>`;
  }).join('');
}

function setRoomFilter(r) {
  currentRoomFilter = r;
  renderList();
}

// ── STATS ──────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('subtitle-count').textContent = `${items.length} article${items.length > 1 ? 's' : ''}`;
  const garde = items.filter(i => destClass(i.dest) === 'garde').length;
  const vendre = items.filter(i => destClass(i.dest) === 'vendre').length;
  const jeter = items.filter(i => destClass(i.dest) === 'jeter').length;
  document.getElementById('stats-chips').innerHTML = `
    <span class="chip total">${items.length} total</span>
    ${garde ? `<span class="chip garde">✅ ${garde} garde</span>` : ''}
    ${vendre ? `<span class="chip vendre">💰 ${vendre} vente</span>` : ''}
    ${jeter ? `<span class="chip jeter">🗑 ${jeter} jeter</span>` : ''}
  `;
}

// ── DEST SELECTOR ──────────────────────────────────────────────────────────────
let selectedDest = null;
function renderDestSelector(selected = null) {
  selectedDest = selected || null;
  const sel = document.getElementById('dest-selector');
  sel.innerHTML = destinations.map(d => {
    const dc = destClass(d);
    const isSelected = selectedDest === d;
    return `<div class="dest-option ${dc} ${isSelected ? 'selected' : ''}" onclick="selectDest('${d}')">${destEmoji(d)} ${d}</div>`;
  }).join('');
}

function destEmoji(d) {
  const l = d.toLowerCase();
  if (l.includes('garde')) return '✅';
  if (l.includes('jeter')) return '🗑';
  if (l.includes('vendre')) return '💰';
  return '📌';
}

function selectDest(d) {
  selectedDest = d;
  renderDestSelector(d);
}

function addCustomDest() {
  const input = document.getElementById('new-dest-input');
  const val = input.value.trim();
  if (!val || destinations.includes(val)) return;
  destinations.push(val);
  save();
  renderDestSelector(val);
  input.value = '';
}

// ── PHOTOS ─────────────────────────────────────────────────────────────────────
function handlePhotos(event) {
  const files = [...event.target.files];
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      currentPhotos.push(e.target.result);
      renderPhotoPreviews();
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function renderPhotoPreviews() {
  document.getElementById('photo-previews').innerHTML = currentPhotos.map((p, i) => `
    <div class="photo-preview-wrap">
      <img src="${p}" alt="">
      <button class="del-photo" onclick="removePhoto(${i})">×</button>
    </div>
  `).join('');
}

function removePhoto(idx) {
  currentPhotos.splice(idx, 1);
  renderPhotoPreviews();
}

// ── SAVE ───────────────────────────────────────────────────────────────────────
function saveItem() {
  const room = document.getElementById('f-room').value;
  const desc = document.getElementById('f-desc').value.trim();
  const qty = parseInt(document.getElementById('f-qty').value) || 1;
  const notes = document.getElementById('f-notes').value.trim();

  if (!desc) { alert('Veuillez saisir une description.'); return; }

  if (editingId) {
    const item = items.find(i => i.id === editingId);
    if (item) {
      item.room = room; item.desc = desc; item.qty = qty;
      item.dest = selectedDest; item.notes = notes;
      item.photos = [...currentPhotos];
    }
  } else {
    items.push({
      id: Date.now().toString(),
      room, desc, qty,
      dest: selectedDest,
      notes,
      photos: [...currentPhotos],
      createdAt: new Date().toISOString()
    });
  }

  save();
  showList();
}

// ── DETAIL ─────────────────────────────────────────────────────────────────────
function showDetail(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const dc = destClass(item.dest);

  const photosHTML = item.photos && item.photos.length > 0
    ? `<div class="detail-photos">${item.photos.map(p => `<img src="${p}" alt="">`).join('')}</div>`
    : `<div class="no-photo-placeholder">${roomEmoji(item.room)}</div>`;

  document.getElementById('detail-content').innerHTML = `
    ${photosHTML}
    <div class="detail-title">${item.desc || 'Sans description'}</div>
    <span class="dest-badge ${dc}" style="display:inline-block;margin:8px 0 16px;">${item.dest || '—'}</span>
    <div class="detail-row">
      <span class="detail-label">Pièce</span>
      <span class="detail-value">${item.room || '—'}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Quantité</span>
      <span class="detail-value">${item.qty || 1}</span>
    </div>
    ${item.notes ? `<div class="detail-row">
      <span class="detail-label">Notes</span>
      <span class="detail-value">${item.notes}</span>
    </div>` : ''}
    <div class="detail-row">
      <span class="detail-label">Ajouté le</span>
      <span class="detail-value">${new Date(item.createdAt).toLocaleDateString('fr-FR')}</span>
    </div>
    <button class="btn-edit" onclick="showAdd('${id}')">✏️ Modifier</button>
    <button class="btn-delete" onclick="deleteItem('${id}')">🗑 Supprimer</button>
  `;

  show('view-detail');
}

function deleteItem(id) {
  if (!confirm('Supprimer cet article ?')) return;
  items = items.filter(i => i.id !== id);
  save();
  showList();
}

// ── EXPORT CSV ─────────────────────────────────────────────────────────────────
function exportCSV() {
  if (items.length === 0) { alert('Aucun article à exporter.'); return; }
  const headers = ['Pièce','Description','Quantité','Destination','Notes','Date'];
  const rows = items.map(i => [
    i.room || '',
    i.desc || '',
    i.qty || 1,
    i.dest || '',
    (i.notes || '').replace(/,/g, ';'),
    new Date(i.createdAt).toLocaleDateString('fr-FR')
  ]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `inventaire_${new Date().toLocaleDateString('fr-FR').replace(/\//g,'-')}.csv`;
  a.click();
}

// ── INIT ───────────────────────────────────────────────────────────────────────
showList();
</script>
</body>
