<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inventaire Mobilier</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#F5F2EE;--surf:#fff;--s2:#EDEAE5;--text:#1A1714;--muted:#8A8480;--accent:#C4633A;--garde:#3A7D5B;--garde-bg:#DFF0E8;--vendre:#C4633A;--vendre-bg:#F5E6DC;--jeter:#8A8480;--jeter-bg:#EDEAE5;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);max-width:500px;margin:0 auto;min-height:100vh;}

/* HEADER */
.hdr{background:var(--text);color:#F5F2EE;padding:16px 16px 12px;position:sticky;top:0;z-index:100;}
.hdr h1{font-family:'DM Serif Display',serif;font-size:21px;}
.hdr .sub{font-size:11px;color:#8A8480;margin-top:2px;}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start;}
.chips{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
.chip.t{background:#2E2B28;color:#F5F2EE;}
.chip.g{background:var(--garde);color:#fff;}
.chip.v{background:var(--vendre);color:#fff;}
.chip.j{background:#555;color:#fff;}
.exp-btn{padding:7px 12px;border-radius:9px;border:1.5px solid #444;background:transparent;color:#F5F2EE;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;}

/* TABS */
.tabs{display:flex;background:var(--s2);margin:10px 14px 0;border-radius:11px;padding:3px;}
.tab{flex:1;padding:7px 2px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;border-radius:8px;}
.tab.on{background:#fff;color:var(--text);box-shadow:0 1px 5px rgba(0,0,0,.1);}
.fbar{display:flex;gap:7px;padding:10px 14px 4px;overflow-x:auto;scrollbar-width:none;}
.fbar::-webkit-scrollbar{display:none;}
.fbtn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--s2);background:#fff;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;}
.fbtn.on{background:var(--text);border-color:var(--text);color:#fff;}

/* LIST */
.list-wrap{padding:0 14px 90px;}
.room-lbl{font-family:'DM Serif Display',serif;font-size:12px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;font-style:italic;margin:14px 0 6px 2px;}
.card{background:#fff;border-radius:14px;padding:12px;margin-bottom:7px;display:flex;gap:11px;align-items:flex-start;cursor:pointer;box-shadow:0 2px 12px rgba(26,23,20,.07);}
.card:active{opacity:.85;}
.cphoto{width:52px;height:52px;border-radius:9px;background:var(--s2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;}
.cphoto img{width:100%;height:100%;object-fit:cover;}
.cinfo{flex:1;min-width:0;}
.cdesc{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cmeta{font-size:11px;color:var(--muted);margin-top:2px;}
.cfoot{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
.badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;}
.badge.garde{background:var(--garde-bg);color:var(--garde);}
.badge.vendre{background:var(--vendre-bg);color:var(--vendre);}
.badge.jeter{background:var(--jeter-bg);color:var(--jeter);}
.badge.autre{background:#EEE5F8;color:#6B3FA0;}
.cqty{font-size:11px;color:var(--muted);}
.empty{text-align:center;padding:50px 24px;color:var(--muted);}
.empty .ei{font-size:44px;margin-bottom:14px;}
.empty h3{font-family:'DM Serif Display',serif;font-size:19px;color:var(--text);margin-bottom:7px;}
.empty p{font-size:13px;line-height:1.5;}

/* FORM */
.form-wrap{padding:16px 16px 100px;}
.form-ttl{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:6px;}
.err-msg{display:none;background:#FFF0F0;color:#C62828;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:500;margin-bottom:14px;}
.fg{margin-bottom:14px;}
label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
input[type=text],input[type=number],select,textarea{width:100%;padding:13px 14px;border:1.5px solid var(--s2);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;background:#fff;color:var(--text);outline:none;-webkit-appearance:none;appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:none;min-height:80px;}
.dest-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.dopt{padding:12px;border-radius:12px;border:2px solid var(--s2);cursor:pointer;text-align:center;font-size:12px;font-weight:600;background:#fff;}
.dopt.on.garde{border-color:var(--garde);background:var(--garde-bg);color:var(--garde);}
.dopt.on.vendre{border-color:var(--vendre);background:var(--vendre-bg);color:var(--vendre);}
.dopt.on.jeter{border-color:var(--jeter);background:var(--jeter-bg);color:var(--jeter);}
.dopt.on.autre{border-color:#6B3FA0;background:#EEE5F8;color:#6B3FA0;}
.cust-row{display:flex;gap:8px;margin-top:8px;}
.cust-row input{flex:1;}
.btn-add-dest{padding:13px 14px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.photo-zone{border:2px dashed var(--s2);border-radius:13px;padding:20px;text-align:center;background:#fff;}
.photo-zone p{font-size:12px;color:var(--muted);margin-bottom:10px;}
.btn-photo{padding:11px 20px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.previews{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.pw{position:relative;width:68px;height:68px;}
.pw img{width:68px;height:68px;border-radius:10px;object-fit:cover;}
.dph{position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;background:var(--text);color:#fff;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-save{width:100%;padding:16px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;margin-top:10px;letter-spacing:.2px;}
.btn-cancel{width:100%;padding:13px;border-radius:14px;border:2px solid var(--s2);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}

/* DETAIL */
.det-wrap{padding:16px 16px 100px;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;background:none;border:none;margin-bottom:18px;padding:0;}
.det-photos{display:flex;gap:8px;overflow-x:auto;margin-bottom:18px;scrollbar-width:none;}
.det-photos img{width:180px;height:140px;border-radius:13px;object-fit:cover;flex-shrink:0;}
.no-photo{width:100%;height:120px;border-radius:13px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:18px;}
.det-ttl{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:6px;}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--s2);}
.det-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.det-val{font-size:13px;font-weight:500;text-align:right;max-width:60%;}
.btn-edit{width:100%;padding:14px;border-radius:13px;border:2px solid var(--s2);background:#fff;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;}
.btn-del{width:100%;padding:14px;border-radius:13px;border:2px solid #FFCDD2;background:#FFF5F5;color:#C62828;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}
.btn-del.confirm{background:#C62828;border-color:#C62828;color:#fff;}

/* FAB */
.fab{position:fixed;bottom:22px;right:18px;width:58px;height:58px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 18px rgba(196,99,58,.45);display:flex;align-items:center;justify-content:center;z-index:200;}

/* VIEWS */
#vList,#vAdd,#vDet{display:none;}
#vList.on,#vAdd.on,#vDet.on{display:block;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div><h1>🏠 Inventaire</h1><div class="sub" id="sub">0 article</div></div>
    <div style="display:flex;gap:6px;flex-direction:column;align-items:flex-end;">
      <button class="exp-btn" onclick="exportJSON()">💾 Sauvegarde</button>
      <button class="exp-btn" onclick="exportCSV()" style="font-size:10px;padding:5px 10px;">📊 CSV</button>
    </div>
  </div>
  <div class="chips" id="chips"></div>
</div>

<input type="file" id="importInput" accept=".json" style="display:none" onchange="importJSON(event)">
<!-- LIST -->
<div id="vList">
  <div class="tabs">
    <button class="tab on" onclick="setTab('tous',this)">Tous</button>
    <button class="tab" onclick="setTab('garde',this)">✅ Garde</button>
    <button class="tab" onclick="setTab('vendre',this)">💰 Vente</button>
    <button class="tab" onclick="setTab('jeter',this)">🗑 Jeter</button>
  </div>
  <div class="fbar" id="fbar"></div>
  <div class="list-wrap" id="listWrap"></div>
  <button class="fab" onclick="openAdd()">+</button>
  <button onclick="document.getElementById('importInput').click()" style="position:fixed;bottom:22px;left:18px;padding:10px 16px;border-radius:20px;border:none;background:#1A1714;color:#F5F2EE;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.2);">📂 Restaurer</button>
</div>

<!-- ADD/EDIT -->
<div id="vAdd">
  <div class="form-wrap">
    <div class="form-ttl" id="formTtl">Nouvel article</div>
    <div class="err-msg" id="errMsg"></div>

    <div class="fg">
      <label>Pièce</label>
      <select id="fRoom">
        <option value="">Choisir une pièce…</option>
        <option>Salon</option><option>Chambre principale</option><option>Chambre 2</option>
        <option>Chambre 3</option><option>Cuisine</option><option>Salle de bain</option>
        <option>Entrée</option><option>Bureau</option><option>Garage</option>
        <option>Cave</option><option>Autre</option>
      </select>
    </div>

    <div class="fg">
      <label>Description *</label>
      <input type="text" id="fDesc" placeholder="Ex: Canapé 3 places en lin beige…">
    </div>

    <div class="fg">
      <label>Quantité</label>
      <input type="number" id="fQty" value="1" min="1" style="width:90px">
    </div>

    <div class="fg">
      <label>Destination</label>
      <div class="dest-grid" id="destGrid"></div>
      <div class="cust-row">
        <input type="text" id="custDest" placeholder="Autre destination…">
        <button class="btn-add-dest" onclick="addDest()">+ Ajouter</button>
      </div>
    </div>

    <div class="fg">
      <label>Notes</label>
      <textarea id="fNotes" placeholder="État, prix souhaité, remarques…"></textarea>
    </div>

    <div class="fg">
      <label>Photos</label>
      <div class="photo-zone">
        <div style="font-size:28px">📷</div>
        <p>Galerie ou appareil photo</p>
        <button class="btn-photo" onclick="document.getElementById('photoInput').click()">+ Ajouter une photo</button>
        <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handlePhotos(event)">
      </div>
      <div class="previews" id="previews"></div>
    </div>

    <button class="btn-save" onclick="saveItem()">💾 Enregistrer</button>
    <button class="btn-cancel" onclick="showList()">Annuler</button>
  </div>
</div>

<!-- DETAIL -->
<div id="vDet">
  <div class="det-wrap">
    <button class="back-btn" onclick="showList()">← Retour</button>
    <div id="detContent"></div>
  </div>
</div>

<script>
// STATE
let items = [];
let dests = ['Je garde','À jeter','À vendre'];
let curTab = 'tous';
let curRoom = 'all';
let editId = null;
let photos = [];
let selDest = null;
let delConfirm = null;

try { items = JSON.parse(localStorage.getItem('inv_items')||'[]'); } catch(e){}
try { dests = JSON.parse(localStorage.getItem('inv_dests')||JSON.stringify(dests)); } catch(e){}

function persist() {
  try { localStorage.setItem('inv_items', JSON.stringify(items)); localStorage.setItem('inv_dests', JSON.stringify(dests)); } catch(e){}
}

// HELPERS
function dc(d) {
  if (!d) return '';
  const l = d.toLowerCase();
  if (l.includes('garde')) return 'garde';
  if (l.includes('vendre')) return 'vendre';
  if (l.includes('jeter')) return 'jeter';
  return 'autre';
}
function de(d) {
  if (!d) return '📌';
  const l = d.toLowerCase();
  if (l.includes('garde')) return '✅';
  if (l.includes('jeter')) return '🗑';
  if (l.includes('vendre')) return '💰';
  return '📌';
}
function re(r) {
  if (!r) return '📦';
  const l = r.toLowerCase();
  if (l.includes('salon')) return '🛋️';
  if (l.includes('chambre')) return '🛏️';
  if (l.includes('cuisine')) return '🍳';
  if (l.includes('bain')) return '🛁';
  if (l.includes('bureau')) return '💼';
  if (l.includes('entrée')) return '🚪';
  if (l.includes('garage')) return '🚗';
  if (l.includes('cave')) return '🍷';
  return '📦';
}
function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(()=>{ el.style.display='none'; }, 3000);
}

// VIEWS
function showList() {
  document.getElementById('vList').className='on';
  document.getElementById('vAdd').className='';
  document.getElementById('vDet').className='';
  renderList();
}
function showAdd() {
  document.getElementById('vList').className='';
  document.getElementById('vAdd').className='on';
  document.getElementById('vDet').className='';
}
function showDet() {
  document.getElementById('vList').className='';
  document.getElementById('vAdd').className='';
  document.getElementById('vDet').className='on';
}

// OPEN ADD FORM
function openAdd(id) {
  editId = id || null;
  photos = [];
  selDest = null;
  document.getElementById('fRoom').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fQty').value = 1;
  document.getElementById('fNotes').value = '';
  document.getElementById('previews').innerHTML = '';
  document.getElementById('errMsg').style.display = 'none';
  document.getElementById('formTtl').textContent = id ? 'Modifier' : 'Nouvel article';

  if (id) {
    const it = items.find(i=>i.id===id);
    if (it) {
      document.getElementById('fRoom').value = it.room||'';
      document.getElementById('fDesc').value = it.desc||'';
      document.getElementById('fQty').value = it.qty||1;
      document.getElementById('fNotes').value = it.notes||'';
      photos = it.photos ? [...it.photos] : [];
      selDest = it.dest||null;
      renderPreviews();
    }
  }
  renderDestGrid();
  showAdd();
  window.scrollTo(0,0);
}

// DEST GRID
function renderDestGrid() {
  document.getElementById('destGrid').innerHTML = dests.map(d => {
    const cls = dc(d);
    const on = selDest===d ? 'on' : '';
    return `<div class="dopt ${cls} ${on}" onclick="pickDest('${d.replace(/'/g,"\\'")}')"><div>${de(d)}</div><div>${d}</div></div>`;
  }).join('');
}
function pickDest(d) { selDest=d; renderDestGrid(); }
function addDest() {
  const v = document.getElementById('custDest').value.trim();
  if (!v || dests.includes(v)) return;
  dests.push(v); persist();
  selDest=v;
  document.getElementById('custDest').value='';
  renderDestGrid();
}

// PHOTOS
function compressAndAdd(file) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.src = url;
  });
}
function handlePhotos(e) {
  const btn = document.querySelector('.btn-photo');
  btn.textContent = '⏳ Chargement…';
  btn.disabled = true;
  const files = [...e.target.files];
  Promise.all(files.map(compressAndAdd)).then(results => {
    photos.push(...results);
    renderPreviews();
    btn.textContent = '+ Ajouter une photo';
    btn.disabled = false;
  });
  e.target.value='';
}
function renderPreviews() {
  document.getElementById('previews').innerHTML = photos.map((p,i)=>
    `<div class="pw"><img src="${p}"><button class="dph" onclick="removePhoto(${i})">×</button></div>`
  ).join('');
}
function removePhoto(i) { photos.splice(i,1); renderPreviews(); }

// SAVE
function saveItem() {
  const room = document.getElementById('fRoom').value;
  const desc = document.getElementById('fDesc').value.trim();
  const qty = parseInt(document.getElementById('fQty').value)||1;
  const notes = document.getElementById('fNotes').value.trim();

  if (!desc) { showErr('⚠️ La description est obligatoire'); return; }

  if (editId) {
    const it = items.find(i=>i.id===editId);
    if (it) { it.room=room; it.desc=desc; it.qty=qty; it.dest=selDest; it.notes=notes; it.photos=[...photos]; }
  } else {
    items.push({ id:Date.now().toString(), room, desc, qty, dest:selDest, notes, photos:[...photos], createdAt:new Date().toISOString() });
  }
  persist();
  showList();
}

// DETAIL
function openDetail(id) {
  delConfirm = null;
  const it = items.find(i=>i.id===id);
  if (!it) return;
  const cls = dc(it.dest);
  const photosHtml = it.photos&&it.photos.length
    ? `<div class="det-photos">${it.photos.map(p=>`<img src="${p}">`).join('')}</div>`
    : `<div class="no-photo">${re(it.room)}</div>`;

  document.getElementById('detContent').innerHTML = `
    ${photosHtml}
    <div class="det-ttl">${it.desc||'Sans description'}</div>
    <span class="badge ${cls}" style="display:inline-block;margin:7px 0 14px">${it.dest||'—'}</span>
    <div class="det-row"><span class="det-lbl">Pièce</span><span class="det-val">${it.room||'—'}</span></div>
    <div class="det-row"><span class="det-lbl">Quantité</span><span class="det-val">${it.qty||1}</span></div>
    ${it.notes?`<div class="det-row"><span class="det-lbl">Notes</span><span class="det-val">${it.notes}</span></div>`:''}
    <div class="det-row"><span class="det-lbl">Ajouté le</span><span class="det-val">${new Date(it.createdAt).toLocaleDateString('fr-FR')}</span></div>
    <button class="btn-edit" onclick="openAdd('${id}')">✏️ Modifier</button>
    <button class="btn-del" id="delBtn" onclick="deleteItem('${id}')">🗑 Supprimer</button>
  `;
  showDet();
}

function deleteItem(id) {
  const btn = document.getElementById('delBtn');
  if (!btn) return;
  if (delConfirm !== id) {
    delConfirm = id;
    btn.textContent = '⚠️ Appuyer à nouveau pour confirmer';
    btn.classList.add('confirm');
    setTimeout(()=>{ delConfirm=null; btn.textContent='🗑 Supprimer'; btn.classList.remove('confirm'); }, 3000);
    return;
  }
  items = items.filter(i=>i.id!==id);
  persist();
  showList();
}

// LIST
function setTab(t, btn) {
  curTab=t; curRoom='all';
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderList();
}

function renderList() {
  updateStats();
  // filter bar
  const rooms = [...new Set(items.map(i=>i.room).filter(Boolean))];
  document.getElementById('fbar').innerHTML =
    ['all',...rooms].map(r=>{
      const lbl = r==='all'?'Toutes les pièces':r;
      return `<button class="fbtn ${curRoom===r?'on':''}" onclick="setRoom('${r}')">${lbl}</button>`;
    }).join('');

  let filtered = items.filter(it=>{
    if (curTab==='garde' && dc(it.dest)!=='garde') return false;
    if (curTab==='vendre' && dc(it.dest)!=='vendre') return false;
    if (curTab==='jeter' && dc(it.dest)!=='jeter') return false;
    if (curRoom!=='all' && it.room!==curRoom) return false;
    return true;
  });

  const wrap = document.getElementById('listWrap');
  if (!filtered.length) {
    wrap.innerHTML=`<div class="empty"><div class="ei">🛋️</div><h3>Aucun article</h3><p>Appuyez sur <strong>+</strong> pour ajouter votre premier meuble.</p></div>`;
    return;
  }

  const groups = {};
  filtered.forEach(it=>{ const r=it.room||'Sans pièce'; if(!groups[r])groups[r]=[]; groups[r].push(it); });

  wrap.innerHTML = Object.entries(groups).map(([room,its])=>`
    <div><div class="room-lbl">${room}</div>
    ${its.map(it=>{
      const cls=dc(it.dest);
      const ph = it.photos&&it.photos.length
        ? `<div class="cphoto"><img src="${it.photos[0]}"></div>`
        : `<div class="cphoto">${re(it.room)}</div>`;
      return `<div class="card" onclick="openDetail('${it.id}')">
        ${ph}
        <div class="cinfo">
          <div class="cdesc">${it.desc||'Sans description'}</div>
          <div class="cmeta">${it.room||''}</div>
          <div class="cfoot">
            <span class="badge ${cls}">${it.dest||'—'}</span>
            <span class="cqty">× ${it.qty||1}</span>
          </div>
        </div>
      </div>`;
    }).join('')}
    </div>`).join('');
}

function setRoom(r) { curRoom=r; renderList(); }

function updateStats() {
  document.getElementById('sub').textContent = `${items.length} article${items.length>1?'s':''}`;
  const g=items.filter(i=>dc(i.dest)==='garde').length;
  const v=items.filter(i=>dc(i.dest)==='vendre').length;
  const j=items.filter(i=>dc(i.dest)==='jeter').length;
  document.getElementById('chips').innerHTML =
    `<span class="chip t">${items.length} total</span>`+
    (g?`<span class="chip g">✅ ${g}</span>`:'')+
    (v?`<span class="chip v">💰 ${v}</span>`:'')+
    (j?`<span class="chip j">🗑 ${j}</span>`:'');
}

// EXPORT
function exportJSON() {
  const data = { version:1, exportedAt:new Date().toISOString(), items, dests };
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(data));
  a.download = 'inventaire_backup_' + new Date().toLocaleDateString('fr-FR').replace(/\//g,'-') + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('✅ Sauvegarde téléchargée !');
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.items || !Array.isArray(data.items)) throw new Error();
      const merge = confirm('Fusionner avec les données existantes ?\n(Annuler = remplacer tout)');
      if (merge) {
        const existingIds = new Set(items.map(i=>i.id));
        const newItems = data.items.filter(i=>!existingIds.has(i.id));
        items = [...items, ...newItems];
      } else {
        items = data.items;
      }
      if (data.dests) dests = data.dests;
      persist();
      showList();
      showToast('✅ ' + (merge?'Fusion':'Restauration') + ' réussie — ' + items.length + ' articles');
    } catch(err) {
      showToast('❌ Fichier invalide');
    }
  };
  r.readAsText(file);
  e.target.value='';
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1A1714;color:#F5F2EE;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;transition:opacity .3s;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity='0'; }, 2500);
}

function exportCSV() {
  if (!items.length) return;
  const rows=[['Pièce','Description','Quantité','Destination','Notes','Date'],
    ...items.map(i=>[i.room||'',i.desc||'',i.qty||1,i.dest||'',(i.notes||'').replace(/,/g,';'),new Date(i.createdAt).toLocaleDateString('fr-FR')])];
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='inventaire.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// INIT
showList();
